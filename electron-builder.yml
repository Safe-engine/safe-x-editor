productName: react-component-editor
appId: org.rd.react-component-editor
files:
  - package.json
  - build
  - resources
  - node_modules
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
mac:
  artifactName: ${productName}${version}.${ext}
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: true
  icon: build/icon.icns
win:
  artifactName: ${productName}.${version}.${ext}
  target:
    target: nsis
    arch:
      - ia32
      - x64
  icon: build/icon.ico
linux:
  target:
    - deb
    - AppImage
  category: Development
directories:
  buildResources: resources
  output: release
# asar: false
extraMetadata:
  main: build/main/index.js